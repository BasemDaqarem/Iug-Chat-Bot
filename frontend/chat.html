<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0d0d0f" />
  <title>المساعد الجامعي — الجامعة الإسلامية بغزة</title>
  <link rel="stylesheet" href="styles.css?v=2" />
  <link rel="stylesheet" href="chat.css?v=2" />
</head>
<body class="chat-body">
  <div class="aura" aria-hidden="true">
    <span class="glow glow--gold"></span>
    <span class="glow glow--soft"></span>
    <span class="grain"></span>
  </div>

  <div class="chat">
    <!-- Header -->
    <header class="chat__bar glass">
      <span class="chat__crest" aria-hidden="true">
        <svg viewBox="0 0 64 64" width="26" height="26">
          <defs><linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#F3DFA2"/><stop offset="1" stop-color="#A8801E"/>
          </linearGradient></defs>
          <path fill="url(#g2)" d="M32 3l4.6 9.3 10.3 1.5-7.4 7.3 1.7 10.2L32 26.4l-9.2 4.9 1.7-10.2-7.4-7.3 10.3-1.5z"/>
        </svg>
      </span>
      <div class="chat__id">
        <strong class="chat__title">المساعد الجامعي</strong>
        <span class="chat__sub" id="whoami">…</span>
      </div>
      <button class="chat__logout" id="logout" title="تسجيل الخروج">
        <svg viewBox="0 0 24 24"><path d="M10 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h4v-2H6V5h4V3Zm7 4-1.4 1.4L17.2 10H10v2h7.2l-1.6 1.6L17 15l4-4-4-4Z"/></svg>
      </button>
    </header>

    <!-- Messages -->
    <main class="chat__scroll" id="scroll">
      <div class="msg msg--bot reveal">
        <span class="msg__ava" aria-hidden="true">✦</span>
        <div class="msg__bubble" id="welcome">أهلاً بك 👋</div>
      </div>
      <div class="chips" id="chips">
        <button class="chip">ما هي حالتي الأكاديمية؟</button>
        <button class="chip">كم رسوم كلية الطب للساعة؟</button>
        <button class="chip">ما معدل القبول في كلية الهندسة؟</button>
        <button class="chip">ما هي تخصصات الماجستير المتاحة؟</button>
      </div>
    </main>

    <!-- Composer -->
    <form class="composer glass" id="composer">
      <input id="q" type="text" autocomplete="off" placeholder="اكتب سؤالك للجامعة…" maxlength="2000" />
      <button class="composer__send" id="send" type="submit" aria-label="إرسال">
        <svg viewBox="0 0 24 24"><path d="M3 11.5 21 3l-8.5 18-2.2-7.3L3 11.5Z"/></svg>
      </button>
    </form>
  </div>

  <script src="chat.js?v=3"></script>
</body>
</html>
