<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#2f6f50" />
  <meta name="description" content="المساعد الجامعي الذكي للجامعة الإسلامية بغزة" />
  <title>المساعد الجامعي — الجامعة الإسلامية بغزة</title>
  <link rel="icon" type="image/png" href="assets/iug-logo.png" />
  <link rel="stylesheet" href="styles.css?v=10" />
  <link rel="stylesheet" href="chat.css?v=10" />
</head>
<body class="chat-body">
  <a class="skip-link" href="#scroll">تخطي إلى المحادثة</a>

  <div class="aura" aria-hidden="true">
    <span class="glow glow--green"></span>
    <span class="glow glow--blue"></span>
  </div>

  <div class="chat">
    <header class="chat__bar">
      <span class="chat__crest">
        <img
          src="assets/iug-logo.png"
          alt="شعار الجامعة الإسلامية بغزة"
          width="233"
          height="233"
        />
      </span>
      <div class="chat__id">
        <strong class="chat__title">المساعد الجامعي</strong>
        <span class="chat__sub" id="whoami">جارٍ التحقق من الجلسة…</span>
      </div>
      <span class="chat__status" aria-label="الخدمة متصلة">متصل</span>
      <a class="chat__portal" id="portalLink" href="employee.html" hidden>لوحة العمل</a>
      <button class="chat__logout" id="logout" type="button" title="تسجيل الخروج" aria-label="تسجيل الخروج">
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M10 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h4v-2H6V5h4V3Zm7 4-1.4 1.4L17.2 10H10v2h7.2l-1.6 1.6L17 15l4-4-4-4Z"/></svg>
      </button>
    </header>

    <main
      class="chat__scroll"
      id="scroll"
      tabindex="-1"
      role="log"
      aria-label="سجل المحادثة"
      aria-live="polite"
      aria-relevant="additions"
    >
      <div class="msg msg--bot reveal">
        <span class="msg__ava" aria-hidden="true">ج</span>
        <div class="msg__bubble" id="welcome">أهلاً بك 👋</div>
      </div>
      <div class="chips" id="chips" aria-label="أسئلة مقترحة">
        <button class="chip" type="button" data-role-chip hidden>ما هي حالتي الأكاديمية؟</button>
        <button class="chip" type="button">كم رسوم كلية الطب للساعة؟</button>
        <button class="chip" type="button">ما معدل القبول في كلية الهندسة؟</button>
        <button class="chip" type="button">ما تخصصات الماجستير المتاحة؟</button>
      </div>
    </main>

    <form class="composer" id="composer" aria-label="إرسال سؤال إلى المساعد">
      <label class="sr-only" for="q">اكتب سؤالك للجامعة</label>
      <input id="q" type="text" autocomplete="off" placeholder="اكتب سؤالك للجامعة…" maxlength="2000" />
      <button class="composer__send" id="send" type="submit" aria-label="إرسال السؤال">
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M3 11.5 21 3l-8.5 18-2.2-7.3L3 11.5Z"/></svg>
      </button>
    </form>
  </div>

  <script src="chat.js?v=10"></script>
</body>
</html>
