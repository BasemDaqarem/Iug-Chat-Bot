<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0d0d0f" />
  <title>بوابة الطالب — الجامعة الإسلامية بغزة</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Ambient luxury background -->
  <div class="aura" aria-hidden="true">
    <span class="glow glow--gold"></span>
    <span class="glow glow--soft"></span>
    <span class="grain"></span>
  </div>

  <main class="stage">
    <section class="card glass" id="card">

      <!-- Brand -->
      <header class="brand reveal" style="--i:0">
        <span class="crest" aria-hidden="true">
          <svg viewBox="0 0 64 64" width="46" height="46">
            <defs>
              <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0" stop-color="#F3DFA2"/>
                <stop offset="0.5" stop-color="#D4AF37"/>
                <stop offset="1" stop-color="#A8801E"/>
              </linearGradient>
            </defs>
            <path fill="url(#g)" d="M32 3l4.6 9.3 10.3 1.5-7.4 7.3 1.7 10.2L32 26.4l-9.2 4.9 1.7-10.2-7.4-7.3 10.3-1.5z"/>
            <path fill="none" stroke="url(#g)" stroke-width="2.2" stroke-linejoin="round"
                  d="M14 30c0 13 8 22 18 27 10-5 18-14 18-27"/>
          </svg>
        </span>
        <h1 class="brand__title">بوابة الطالب</h1>
        <p class="brand__sub">الجامعة الإسلامية بغزة</p>
      </header>

      <!-- Login / Register switch -->
      <div class="switch reveal" style="--i:1" role="tablist" aria-label="نوع الدخول">
        <span class="switch__thumb" id="thumb"></span>
        <button class="switch__opt is-active" data-mode="login" role="tab">تسجيل الدخول</button>
        <button class="switch__opt" data-mode="register" role="tab">حساب جديد</button>
      </div>

      <!-- Form -->
      <form class="form" id="authForm" novalidate>
        <!-- Name (register only) -->
        <div class="field reveal only-register" style="--i:2" data-role="name">
          <label class="field__label" for="name">الاسم</label>
          <div class="field__box">
            <svg class="field__icon" viewBox="0 0 24 24"><path d="M12 12a5 5 0 1 0 0-10 5 5 0 0 0 0 10Zm0 2c-5 0-9 2.7-9 6v1h18v-1c0-3.3-4-6-9-6Z"/></svg>
            <input id="name" name="name" type="text" autocomplete="name"
                   placeholder="اكتب اسمك الكامل" />
          </div>
          <span class="field__err" data-err="name"></span>
        </div>

        <!-- Student ID -->
        <div class="field reveal" style="--i:3">
          <label class="field__label" for="student_id">الرقم الجامعي</label>
          <div class="field__box">
            <svg class="field__icon" viewBox="0 0 24 24"><path d="M4 4h16a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2Zm2 5v2h5V9H6Zm0 4v2h8v-2H6Zm10-4v6h2V9h-2Z"/></svg>
            <input id="student_id" name="student_id" type="text" inputmode="numeric"
                   autocomplete="username" placeholder="مثال: 120210001" maxlength="20" />
          </div>
          <span class="field__err" data-err="student_id"></span>
        </div>

        <!-- Password -->
        <div class="field reveal" style="--i:4">
          <label class="field__label" for="password">كلمة المرور</label>
          <div class="field__box">
            <svg class="field__icon" viewBox="0 0 24 24"><path d="M12 2a5 5 0 0 0-5 5v3H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8a2 2 0 0 0-2-2h-1V7a5 5 0 0 0-5-5Zm-3 8V7a3 3 0 0 1 6 0v3H9Z"/></svg>
            <input id="password" name="password" type="password"
                   autocomplete="current-password" placeholder="••••••••" maxlength="128" />
            <button type="button" class="field__eye" id="eye" aria-label="إظهار كلمة المرور">
              <svg viewBox="0 0 24 24"><path d="M12 5c-5 0-9 4-10 7 1 3 5 7 10 7s9-4 10-7c-1-3-5-7-10-7Zm0 11a4 4 0 1 1 0-8 4 4 0 0 1 0 8Z"/></svg>
            </button>
          </div>
          <span class="field__err" data-err="password"></span>
        </div>

        <!-- Form-level message -->
        <p class="form__msg" id="formMsg" role="status"></p>

        <!-- Submit -->
        <button class="submit reveal" style="--i:5" id="submit" type="submit">
          <span class="submit__label">تسجيل الدخول</span>
          <span class="submit__spinner" aria-hidden="true"></span>
          <svg class="submit__check" viewBox="0 0 24 24" aria-hidden="true"><path d="M20 6 9 17l-5-5"/></svg>
        </button>
      </form>

      <p class="foot reveal" style="--i:6">
        <span data-foot="login">ليس لديك حساب؟ <a href="#" data-goto="register">أنشئ حساباً</a></span>
        <span data-foot="register" hidden>لديك حساب بالفعل؟ <a href="#" data-goto="login">سجّل الدخول</a></span>
      </p>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
