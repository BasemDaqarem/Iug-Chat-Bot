# نشر تجريبي على Render — https://render.com
# رابط عام دائم يجرّبه أعضاء المشروع من المتصفح عبر /docs (بلا واجهة).
# الأسرار (المفاتيح) تُضاف يدوياً في لوحة Render (sync: false) ولا تُرفع في git.

services:
  - type: web
    name: iug-chatbot-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      # نُبقي /docs متاحة للفريق أثناء التجربة (production تُخفيها)
      - key: API_ENV
        value: development
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: API_CORS_ORIGINS
        value: "*"
      # ── أسرار: عبّئها في لوحة Render (Environment) — لا تُكتب هنا ──
      - key: MONGO_URI
        sync: false
      - key: MONGO_DB_NAME
        sync: false
      - key: UPLOADED_DB_NAME
        sync: false
      - key: CHAT_API_URL
        sync: false
      - key: CHAT_API_KEY
        sync: false
      - key: CHAT_API_MODEL
        sync: false
      - key: EMBED_API_URL
        sync: false
      - key: EMBED_API_KEY
        sync: false
      - key: EMBED_MODEL
        sync: false
